# Build Safeguard Ansible Plugin Collection

variables:
  - template: ../pipeline-templates/global-variables.yml

trigger:
  branches:
    include:
    - main
    - release-*
  tags:
    include:
    - 'collection-v*'
  paths:
    include:
    - collection/
    - pipeline-templates/
    exclude:
    - README.md
    - AGENTS.md

pr:
  branches:
    include:
    - main
    - release-*
  paths:
    include:
    - collection/
    - pipeline-templates/
    exclude:
    - README.md
    - AGENTS.md

jobs:
# -------------------------------------------------------------------
# PR Validation — build only, no publishing
# -------------------------------------------------------------------
- job: PRValidation
  displayName: 'PR Validation - Collection'
  condition: eq(variables['Build.Reason'], 'PullRequest')

  pool:
    vmImage: ubuntu-latest

  steps:
  - template: ../pipeline-templates/build-collection-steps.yml

# -------------------------------------------------------------------
# Build and publish Ansible Galaxy collection
# -------------------------------------------------------------------
- job: BuildCollection
  displayName: 'Build and publish collection'
  condition: ne(variables['Build.Reason'], 'PullRequest')

  pool:
    vmImage: ubuntu-latest

  steps:
  - template: ../pipeline-templates/build-collection-steps.yml

  # GitHub release — prerelease for dev builds, full release for tag builds
  - task: GitHubRelease@1
    displayName: 'Publish collection GitHub release'
    inputs:
      gitHubConnection: 'PangaeaBuild-GitHub'
      repositoryName: 'OneIdentity/safeguard-ansible'
      action: 'create'
      target: '$(Build.SourceVersion)'
      tagSource: 'userSpecifiedTag'
      tag: '$(ReleaseTag)'
      title: 'Safeguard Collection $(PackageVersion)'
      isPreRelease: ${{ not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')) }}
      changeLogCompareToRelease: 'lastFullRelease'
      changeLogType: 'commitBased'
      addChangeLog: true
      assets: $(Build.ArtifactStagingDirectory)/collection/*.tar.gz

  # Galaxy publish — only for tag builds (official releases)
  - task: AzureKeyVault@1
    displayName: 'Get Ansible Galaxy API key'
    condition: and(succeeded(), eq(variables.isCollectionTag, 'True'))
    inputs:
      azureSubscription: 'OneIdentity.RD.SBox.Safeguard-ServiceConnection'
      KeyVaultName: 'SafeguardBuildSecrets'
      SecretsFilter: 'AnsibleGalaxyApiKey1'

  - script: |
      ansible-galaxy collection publish $(Build.ArtifactStagingDirectory)/collection/oneidentity-safeguardcollection-$(PackageVersion).tar.gz --token $(AnsibleGalaxyApiKey1)
    displayName: 'Publish collection to Ansible Galaxy'
    condition: and(succeeded(), eq(variables.isCollectionTag, 'True'))
