- name: Test A2A private key retrieval
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve SSH key via A2A
      ansible.builtin.set_fact:
        credential: >-
          {{ lookup('oneidentity.safeguardcollection.safeguardcredentials',
             lookup('env', 'SGANS_A2A_API_KEY'),
             a2aconnection=a2aconnection) }}
      no_log: true
      vars:
        a2aconnection:
          spp_appliance: "{{ spp_host }}"
          spp_certificate_file: "{{ a2a_cert_file }}"
          spp_certificate_key: "{{ a2a_cert_key }}"
          spp_credential_type: privatekey

    - name: Verify SSH key
      ansible.builtin.assert:
        that:
          - credential is defined
          - credential is string
          - credential | length > 0
          - "'BEGIN' in credential"
          - "'PRIVATE KEY' in credential"
        fail_msg: "SSH key retrieval failed or returned unexpected format"
