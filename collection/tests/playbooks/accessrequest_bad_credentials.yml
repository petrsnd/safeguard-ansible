- name: Test access request with bad user credentials (should fail)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Attempt retrieval with wrong password
      ansible.builtin.set_fact:
        credential: >-
          {{ lookup('oneidentity.safeguardcollection.safeguardaccessrequest',
             asset_name, account_name,
             spp_appliance=spp_appliance,
             spp_provider=spp_provider,
             spp_user=spp_user,
             spp_password='WrongPassword123!') }}
