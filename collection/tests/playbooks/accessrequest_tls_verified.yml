- name: Test access request password retrieval with TLS verification
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve password via access request with TLS verification enabled
      ansible.builtin.set_fact:
        credential: >-
          {{ lookup('oneidentity.safeguardcollection.safeguardaccessrequest',
             asset_name, account_name,
             spp_appliance=spp_appliance,
             spp_provider=spp_provider,
             spp_user=spp_user,
             spp_password=lookup('env', 'SGANS_SPP_PASSWORD'),
             spp_ca_cert=spp_ca_cert,
             spp_validate_certs=true) }}
      no_log: true

    - name: Verify credential
      ansible.builtin.assert:
        that:
          - credential is defined
          - credential is string
          - credential | length > 0
        fail_msg: "TLS-verified access request password retrieval failed"
