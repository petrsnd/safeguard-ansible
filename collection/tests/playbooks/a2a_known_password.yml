- name: Test A2A password retrieval verifying the actual value
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve password via A2A
      ansible.builtin.set_fact:
        credential: >-
          {{ lookup('oneidentity.safeguardcollection.safeguardcredentials',
             lookup('env', 'SGANS_A2A_API_KEY'),
             a2aconnection=a2aconnection) }}
      no_log: true
      vars:
        a2aconnection:
          spp_appliance: "{{ spp_host }}"
          spp_certificate_file: "{{ a2a_cert_file }}"
          spp_certificate_key: "{{ a2a_cert_key }}"

    - name: Verify password matches expected value
      ansible.builtin.assert:
        that:
          - credential == lookup('env', 'SGANS_EXPECTED_PASSWORD')
        fail_msg: "Retrieved password does not match expected value"
      no_log: true
