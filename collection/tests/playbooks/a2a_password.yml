- name: Test A2A password retrieval
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve password via A2A
      ansible.builtin.set_fact:
        credential: >-
          {{ lookup('oneidentity.safeguardcollection.safeguardcredentials',
             lookup('env', 'SGANS_A2A_API_KEY'),
             a2aconnection=a2aconnection) }}
      no_log: true
      vars:
        a2aconnection:
          spp_appliance: "{{ spp_host }}"
          spp_certificate_file: "{{ a2a_cert_file }}"
          spp_certificate_key: "{{ a2a_cert_key }}"

    - name: Verify credential
      ansible.builtin.assert:
        that:
          - credential is defined
          - credential is string
          - credential | length > 0
        fail_msg: "Password retrieval failed"
