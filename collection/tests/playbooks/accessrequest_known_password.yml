- name: Test access request password value matches expected
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Retrieve password via access request
      ansible.builtin.set_fact:
        credential: >-
          {{ lookup('oneidentity.safeguardcollection.safeguardaccessrequest',
             asset_name, account_name,
             spp_appliance=spp_appliance,
             spp_provider=spp_provider,
             spp_user=spp_user,
             spp_password=lookup('env', 'SGANS_SPP_PASSWORD')) }}
      no_log: true

    - name: Verify password matches expected value
      ansible.builtin.assert:
        that:
          - credential == lookup('env', 'SGANS_EXPECTED_PASSWORD')
        fail_msg: "Retrieved password does not match expected value"
      no_log: true
